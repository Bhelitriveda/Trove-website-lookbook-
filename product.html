                <li><a href="contact.html">Contact us</a></li>
            </ul>
        </div>
        <div class="nav-logo">
            <svg viewBox="0 0 190 68" xmlns="http://www.w3.org/2000/svg" fill="none">
                <text x="95" y="30" text-anchor="middle" font-family="'Playfair Display', serif" font-size="30"
                    font-weight="600" fill="#3B1F0F" letter-spacing="5">trove</text>
                <ellipse cx="95" cy="52" rx="13" ry="7.5" stroke="#3B1F0F" stroke-width="1.6" />
                <circle cx="95" cy="52" r="5" fill="#3B1F0F" />
                <circle cx="93" cy="50.2" r="1.5" fill="white" />
                <line x1="88" y1="43" x2="86" y2="39" stroke="#3B1F0F" stroke-width="1.2" />
                <line x1="91.5" y1="42" x2="90.5" y2="38" stroke="#3B1F0F" stroke-width="1.2" />
                <line x1="95" y1="41.5" x2="95" y2="37.5" stroke="#3B1F0F" stroke-width="1.2" />
                <line x1="98.5" y1="42" x2="99.5" y2="38" stroke="#3B1F0F" stroke-width="1.2" />
                <line x1="102" y1="43" x2="104" y2="39" stroke="#3B1F0F" stroke-width="1.2" />

                    <line x1="0" y1="-8" x2="0" y2="8" stroke="#A8945A" stroke-width="1.1" />

                    <line x1="0" y1="-8" x2="0" y2="8" stroke="#A8945A" stroke-width="1.1" />
                    <line x1="-8" y1="0" x2="8" y2="0" stroke="#A8945A" stroke-width="1.1" />
                    <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="#A8945A" stroke-width="0.7" />

                    <rect x="3" y="3" width="18" height="18" rx="5" />
                    <circle cx="12" cy="12" r="4" />

                    <path d="M21 11.5a8.5 8.5 0 1 1-3.8-7.1" />
                    <path d="M21 11.5c0-4.7-3.8-8.5-8.5-8.5a8.5 8.5 0 0 0-7.4 12.7L4 21l5.4-1.1a8.5 8.5 0 0 0 3.1.6" />

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="shop.html">Catalogue</a>
        <a href="about.html">Our Story</a>
        <a href="contact.html">Contact us</a>
    </div>

    <main class="product-page">

        <div class="product-loading" id="productLoading">
            <p>Loading product...</p>
        </div>

        <div class="product-error" id="productError" style="display:none;">
            <p>We couldn't find that product.</p>
            <a href="shop.html" class="product-back-link">← Back to Catalogue</a>
        </div>

        <div class="product-detail" id="productDetail" style="display:none;">

            <div class="product-gallery">
                <div class="product-gallery-track" id="galleryTrack"></div>

                <button class="gallery-arrow gallery-arrow-left" id="galleryPrev" aria-label="Previous image">‹</button>
                <button class="gallery-arrow gallery-arrow-right" id="galleryNext" aria-label="Next image">›</button>

                <div class="gallery-dots" id="galleryDots"></div>
            </div>

            <div class="product-info">
                <span class="product-info-category" id="productCategory"></span>
                <h1 class="product-info-name" id="productName"></h1>
                <p class="product-info-price" id="productPrice"></p>
                <span class="product-info-badge" id="productBadge" style="display:none;"></span>
                <p class="product-info-description" id="productDescription"></p>

                <!-- <a href="#" target="_blank" class="shop-now-btn" id="shopNowBtn">Shop Now on Instagram</a> -->

                <div class="shop-now-buttons">
                    <a href="#" target="_blank" class="shop-now-btn shop-now-instagram" id="shopNowBtn">Shop Now on
                        Instagram</a>
                    <a href="#" target="_blank" class="shop-now-btn shop-now-whatsapp" id="shopNowWhatsApp">Shop Now on
                        WhatsApp</a>
                </div>



                <a href="shop.html" class="product-back-link">← Back to Catalogue</a>
            </div>

        </div>

    </main>

    <footer>
        <p class="product-footer-text">Trove · Dehradun, Uttrakhand, India · Handcrafted with love</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/product.js"></script>
</body>

</html>
